  <title>Click Sound</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: #ffffff;
      cursor: pointer;
      user-select: none;
    }

  //  ВАРИАНТ 1 — MP3/WAV ФАЙЛ (твой собственный звук)

  //  1. Положи свой аудио файл в ту же папку что и index.html
  //  2. Впиши имя файла ниже, например: "sound.mp3" или "click.wav"
  //  3. Закомментируй или удали блок ВАРИАНТ 2

  const SOUND_FILE = "skrimer-gubka-boba.mp3"; // <-- сюда имя твоего файла

  const audio = new Audio(SOUND_FILE);
  audio.preload = "auto";

  document.addEventListener("click", () => {
    // Перемотка в начало чтобы можно было кликать быстро
    audio.currentTime = 0;
    audio.play().catch(() => {});
  });
