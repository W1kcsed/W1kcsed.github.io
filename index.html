<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Click Sound</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: #ffffff;
      cursor: pointer;
      user-select: none;
    }
  </style>
</head>
<body>

<script>
  // ============================================================
  //  ВАРИАНТ 1 — MP3/WAV ФАЙЛ (твой собственный звук)
  //
  //  1. Положи свой аудио файл в ту же папку что и index.html
  //  2. Впиши имя файла ниже, например: "sound.mp3" или "click.wav"
  //  3. Закомментируй или удали блок ВАРИАНТ 2
  // ============================================================

  const SOUND_FILE = "sound.mp3"; // <-- сюда имя твоего файла

  const audio = new Audio(SOUND_FILE);
  audio.preload = "auto";
  audio.loop = true;   // 🔁 зацикленный
  audio.volume = 1.0;  // 🔊 максимальная громкость

  let playing = false;

  document.addEventListener("click", () => {
    if (!playing) {
      // первый клик — запускаем с начала
      audio.currentTime = 0;
      audio.play().catch(() => {});
      playing = true;
    }
    // повторные клики — звук продолжает играть по кругу, ничего не делаем
  });


  // ============================================================
  //  ВАРИАНТ 2 — Синтетический звук (без файла, работает сразу)
  //
  //  Если у тебя нет своего файла — раскомментируй этот блок
  //  и закомментируй блок ВАРИАНТ 1 выше
  // ============================================================

    if (!playing) {
      gainNode = ctx.createGain();
      gainNode.gain.setValueAtTime(3.0, ctx.currentTime); // очень громко
      gainNode.connect(ctx.destination);

      oscNode = ctx.createOscillator();
      oscNode.type = "sawtooth";
      oscNode.frequency.setValueAtTime(220, ctx.currentTime);
      oscNode.connect(gainNode);
      oscNode.start();
      playing = true;
    }
    // повторные клики — звук уже играет бесконечно
  });
  */
</script>

</body>
</html>
